[bar/laptop]
inherit = bar/base
monitor = ${env:MONITOR:$monitor_laptop}

[bar/left]
inherit = bar/base
monitor = ${env:MONITOR:$monitor_office_left}

[bar/right]
inherit = bar/base
monitor = ${env:MONITOR:$monitor_office_right}
modules-right = filesystem pulseaudio wlan eth date


[bar/vertical]
inherit = bar/base
monitor = ${env:MONITOR:$monitor_office_vertical}
modules-right =  xkeyboard memory cpu systray